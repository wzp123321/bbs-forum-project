# =============================================================
#  nginx 配置
#  - /              -> 用户端 SPA (bbs-web)
#  - /admin         -> 管理后台 SPA (bbs-admin)
#  - /admin/xxx     -> 后端 Spring Boot (注意 bbs-admin 和后端都用 /admin 开头, 这里前端占 /admin 路径,
#                       所以后端实际挂到 /api 路径下, 容器间用 backend:8888 通信)
#  - /api/...       -> 反代到 bbs-admin 后端
#  - /upload/...    -> 静态资源 (本地存储, 由后端服务)
#  - /ws/chat       -> WebSocket 反代
# =============================================================

# 用户端 SPA
location / {
    root /app/web;
    index index.html;
    try_files $uri $uri/ /index.html;
}

# 管理后台 SPA
location /admin {
    root /app;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
}

# 后端 API 反代
location /api/ {
    proxy_pass http://backend:8888/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# 上传静态资源
location /upload/ {
    proxy_pass http://backend:8888/upload/;
    proxy_set_header Host $host;
}

# WebSocket
location /ws/ {
    proxy_pass http://backend:8888/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
}

# gzip
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
gzip_min_length 1024;
